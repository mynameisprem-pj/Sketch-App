<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#ffffff"/>

  <!-- Book body -->
  <rect x="100" y="160" width="220" height="180" rx="12" fill="#ffffff" stroke="#1c1c1e" stroke-width="12"/>
  <!-- Book spine line -->
  <line x1="100" y1="245" x2="320" y2="245" stroke="#1c1c1e" stroke-width="10"/>
  <!-- Book top curve -->
  <path d="M100 172 Q210 200 320 172" stroke="#1c1c1e" stroke-width="10" fill="none"/>
  <!-- Ruled lines on book -->
  <line x1="130" y1="272" x2="290" y2="272" stroke="#d4cfc6" stroke-width="8"/>
  <line x1="130" y1="298" x2="260" y2="298" stroke="#d4cfc6" stroke-width="8"/>
  <line x1="130" y1="324" x2="240" y2="324" stroke="#d4cfc6" stroke-width="8"/>

  <!-- Pencil body -->
  <rect x="268" y="168" width="52" height="155" rx="6"
        fill="#f5c842" stroke="#c8a200" stroke-width="6"
        transform="rotate(-35 268 168)"/>
  <!-- Pencil tip triangle -->
  <path d="M 306 290 L 326 340 L 346 290"
        fill="#f5c842" stroke="#c8a200" stroke-width="5"
        transform="rotate(-35 326 315)"/>
  <!-- Pencil wood tip -->
  <path d="M 314 326 L 326 352 L 338 326"
        fill="#e8d5a0" stroke="#c8b060" stroke-width="4"
        transform="rotate(-35 326 339)"/>
  <!-- Pencil point -->
  <path d="M 320 348 L 326 364 L 332 348"
        fill="#1c1c1e"
        transform="rotate(-35 326 356)"/>
</svg>
